services:
  mailpit:
    image: axllent/mailpit:latest
    container_name: tf-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP – point the app's SMTP_HOST/SMTP_PORT here
      - "8025:8025" # Web UI – open http://localhost:8025 to read caught emails
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
